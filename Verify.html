<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Verify your account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #2b2d31;
      color: #f2f3f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #313338;
      padding: 40px 32px;
      border-radius: 12px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    h1 { margin: 0 0 12px; font-size: 22px; font-weight: 600; }
    p { margin: 0 0 20px; color: #b5bac1; line-height: 1.5; font-size: 14px; }
    button {
      background: #5865f2;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #4752c4; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      font-size: 14px;
      min-height: 20px;
    }
    .ok { color: #23a55a; }
    .err { color: #f23f43; }
    .muted { color: #80848e; font-size: 12px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verify your account</h1>
    <p>Click below to confirm you're not on an alt account, then return to Discord.</p>
    <button id="verifyBtn">Verify me</button>
    <div class="status" id="status"></div>
    <p class="muted">By clicking verify, you consent to the collection of your IP address and a browser fingerprint for the purpose of detecting alt accounts.</p>
  </div>

  <script src="https://openfpcdn.io/fingerprintjs/v4/iife.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const btn = document.getElementById('verifyBtn');
    const status = document.getElementById('status');

    if (!token) {
      btn.disabled = true;
      status.textContent = 'No token provided.';
      status.className = 'status err';
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.textContent = 'Verifying...';
      status.className = 'status';

      try {
        const fp = await FingerprintJS.load();
        const result = await fp.get();
        const fingerprint = result.visitorId;

        const res = await fetch('/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, fingerprint }),
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          status.textContent = data.error || 'Verification failed.';
          status.className = 'status err';
          return;
        }

        if (data.status === 'verified') {
          status.textContent = 'Verified! You can return to Discord.';
          status.className = 'status ok';
        } else if (data.status === 'flagged') {
          status.textContent = 'Verification denied.';
          status.className = 'status err';
        } else {
          status.textContent = 'Done.';
          status.className = 'status';
        }
      } catch (err) {
        status.textContent = 'Something went wrong. Please try again.';
        status.className = 'status err';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
